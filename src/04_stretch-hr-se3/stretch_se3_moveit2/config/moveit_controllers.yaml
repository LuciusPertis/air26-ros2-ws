# MoveIt executes through a single FollowJointTrajectory controller — but NOT the
# driver's action directly. It points at our trajectory_bridge
# (/stretch_arm_controller/follow_joint_trajectory), which collapses
# joint_arm_l0..l3 into the aggregate wrist_extension the driver understands.
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - stretch_arm_controller

  stretch_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - joint_lift
      - joint_arm_l0
      - joint_arm_l1
      - joint_arm_l2
      - joint_arm_l3
      - joint_wrist_yaw
      - joint_wrist_pitch
      - joint_wrist_roll
      - joint_head_pan
      - joint_head_tilt
      - joint_gripper_finger_left
      - joint_gripper_finger_right

trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 1.0
  # The bridge executes only the goal waypoint and the sim arm is still settling
  # (and the aggregate wrist_extension is split across 4 segments), so the start of
  # the next trajectory rarely matches the live state exactly. 0.0 disables the
  # start-state check — appropriate in sim, where this residual is harmless.
  allowed_start_tolerance: 0.0
