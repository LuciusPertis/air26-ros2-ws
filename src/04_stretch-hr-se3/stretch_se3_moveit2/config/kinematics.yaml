# IK solver for the arm group. KDL handles the mixed prismatic(lift+telescope) +
# revolute(dex wrist) chain. Joint-space goals (named targets, RViz joint sliders)
# don't need IK; this is only used for Cartesian/pose goals.
stretch_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
