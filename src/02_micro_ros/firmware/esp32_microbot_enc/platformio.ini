; AIR26 Workshop 02 — ESP32 micro-ROS firmware for the obstacle-avoider rover.
; Flashing: USB serial (pio run -t upload).  Runtime micro-ROS transport: WiFi/UDP.
;
;   pio run                 # compile (no board needed)
;   pio run -t upload       # flash over USB  (board on /dev/ttyUSB0)
;   pio device monitor      # serial console
;
; Adjust `board` to your actual ESP32 (esp32dev = generic DevKit v1 / WROOM-32).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; micro-ROS (must match the host ROS 2 distro) + WiFi transport
board_microros_distro = humble
board_microros_transport = wifi
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio

monitor_speed = 115200
upload_speed = 921600
