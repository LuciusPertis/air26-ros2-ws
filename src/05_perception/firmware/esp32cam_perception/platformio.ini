; AIR26 Workshop 05 — ESP32-CAM perception firmware.
; The REAL camera embodiment of the perception rover's front eye. It exposes the SAME two
; cheap topics as the Webots camera_processor, plus a full image over WiFi:
;   micro-ROS (WiFi/UDP):  /camera/light_level (std_msgs/Float32)
;                          /camera/mean_color     (std_msgs/ColorRGBA)
;   WiFi MJPEG HTTP:       http://<board-ip>/stream   (full image; too big for micro-ROS)
;
;   pio run                 # compile
;   pio run -t upload       # flash via FTDI / ESP32-CAM-MB (115200, GPIO0->GND on bare FTDI)
;   pio device monitor      # boot + WiFi + agent diagnostics (monitor_rts/dtr=0 -> no reboot)

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; micro-ROS (must match the host ROS 2 distro) + WiFi transport
board_microros_distro = humble
board_microros_transport = wifi
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

monitor_speed = 115200
upload_speed = 115200
monitor_rts = 0
monitor_dtr = 0
