; AIR26 Workshop 05 — ESP32-CAM health check (standalone, no micro-ROS).
; Proves a board's camera + PSRAM actually work, over the serial console.
;
;   pio run                 # compile (no board needed)
;   pio run -t upload       # flash via FTDI / ESP32-CAM-MB programmer dock
;   pio device monitor      # serial console (115200) -> live health report
;
; The AI-Thinker ESP32-CAM has NO USB. Flash with an FTDI/USB-TTL adapter (3.3V logic, 5V
; for VCC) or the ESP32-CAM-MB dock. On a bare FTDI you must pull GPIO0 -> GND to enter
; download mode, then remove it and reset to run; the MB dock automates this.
;
; upload_speed kept at 115200 — ESP32-CAM over FTDI is unreliable at higher rates.

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

monitor_speed = 115200
; upload_speed: 115200 is the safe default for ESP32-CAM over USB-TTL/MB dock. If uploads are
; flaky you can DROP it (more tolerant of marginal links): try 57600, even 9600 as a last
; resort. Raising it (460800/921600) is faster but less reliable here — only if a board flashes
; cleanly at 115200 first. Note: a stub-level "Failed to communicate with the flash chip" is a
; power/connection problem, not a baud problem, so baud changes won't fix that one.
upload_speed = 115200

; Don't toggle DTR/RTS when opening/closing the monitor. On the ESP32-CAM-MB dock (and any
; auto-reset wiring) DTR/RTS drive EN+GPIO0, so the default monitor REBOOTS the board on
; open and on Ctrl+C — and each reboot spews the ROM bootloader at 74880 baud, which shows as
; "␀␀␀␀" garbage in a 115200 monitor. Setting both to 0 keeps the board running undisturbed.
monitor_rts = 0
monitor_dtr = 0

; --- flash reliability on power-marginal ESP32-CAM + USB-TTL adapters ---
; DIO mode + 40 MHz flash clock are gentler than the qio/80MHz default and tolerate the
; brownouts these boards see during flash write. If uploads still stall, the real fix is a
; solid 5V supply (feed the board's 5V pin from the adapter's 5V, not 3.3V).
board_build.flash_mode = dio
board_build.f_flash = 40000000L

; AI-Thinker board has 4 MB external PSRAM — enable it (camera frame buffers live there).
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
